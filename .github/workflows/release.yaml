name: Release

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check Zig formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:4.3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Generate TLS test certificates
        run: |
          mkdir -p test/fixtures/tls
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout test/fixtures/tls/key.pem -out test/fixtures/tls/cert.pem \
            -days 3650 -nodes -subj "/CN=localhost"

      - name: Run tests
        run: zig build test -Damqp-integration -Dredis-integration

  build:
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install OpenSSL (Linux)
        if: startsWith(matrix.target, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: startsWith(matrix.target, 'darwin-')
        run: |
          brew install openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "C_INCLUDE_PATH=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Stage artifact
        env:
          TARGET: ${{ matrix.target }}
        run: mv zig-out/bin/ztick "zig-out/bin/ztick-$TARGET"

      - uses: actions/upload-artifact@v4
        with:
          name: ztick-${{ matrix.target }}
          path: zig-out/bin/ztick-${{ matrix.target }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: ztick-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum ztick-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES="$(git tag -l --format='%(contents)' "$TAG")"
          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES" artifacts/*
          else
            gh release create "$TAG" --title "$TAG" --generate-notes artifacts/*
          fi

  dev-release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: ztick-*
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum ztick-* > SHA256SUMS

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          TAG="dev-${SHA::7}"
          gh release create "$TAG" \
            --title "$TAG" \
            --prerelease \
            --notes "Dev build from commit $SHA" \
            artifacts/*

      - name: Cleanup old dev releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("dev-")))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag || true
            done
