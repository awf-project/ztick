# GitHub Actions CI for Zig projects
# Generated by awf project-init

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Check formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Run tests
        run: zig build test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: zig-out/bin/
