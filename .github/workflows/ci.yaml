# GitHub Actions CI for Zig projects
# Generated by awf project-init

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Check formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Generate TLS test certificates
        run: |
          mkdir -p test/fixtures/tls
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout test/fixtures/tls/key.pem -out test/fixtures/tls/cert.pem \
            -days 3650 -nodes -subj "/CN=localhost"

      - name: Run tests
        run: zig build test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: zig-out/bin/
