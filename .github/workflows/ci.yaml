# GitHub Actions CI for Zig projects
# Generated by awf project-init

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:4.3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: awf-project/setup-awf@v1

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Generate TLS test certificates
        run: |
          mkdir -p test/fixtures/tls
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout test/fixtures/tls/key.pem -out test/fixtures/tls/cert.pem \
            -days 3650 -nodes -subj "/CN=localhost"

      - name: Run tests
        run: zig build test -Damqp-integration

  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: awf-project/setup-awf@v1

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Generate TLS test certificates
        run: |
          mkdir -p test/fixtures/tls
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout test/fixtures/tls/key.pem -out test/fixtures/tls/cert.pem \
            -days 3650 -nodes -subj "/CN=localhost"

      - name: Run tests with sanitizers
        run: zig build test-sanitize

  build:
    needs: [lint, test, sanitize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: zig-out/bin/
